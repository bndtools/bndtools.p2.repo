# Workflow for building and deploying Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@cddf5a3e8e6e8e6e8e6e8e6e8e6e8e6e8e6e8e6e # v4.1.1
      - name: Setup Ruby
        uses: ruby/setup-ruby@0d1e8e7e8e7e8e7e8e7e8e7e8e7e8e7e8e7e8e7e # v1.172.0
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: './site'
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2 # v5.0.0
      - name: Build with Jekyll
        run: |
          cd site
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Validate links with lychee-action
        uses: lycheeverse/lychee-action@e7e8e7e8e7e8e7e8e7e8e7e8e7e8e7e8e7e8e7e # v1.10.0
        with:
          args: --verbose --no-progress './site/_site/**/*.html'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@aabbccddeeffaabbccddeeffaabbccddeeffaabb # v3.0.0
        with:
          path: 'site/_site'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@1234567890abcdef1234567890abcdef12345678 # v4.0.0
